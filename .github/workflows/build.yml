name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (for local source files)
        run: npm install

      - name: Run unit tests
        run: node test.js --format

      - name: Quick integration test
        run: node test.js --quick
        timeout-minutes: 3

      - name: Verify zero-dependency pipe mode
        run: |
          echo "Testing pipe mode (no node_modules)..."
          mv node_modules node_modules_bak
          node -e "
            const { initSources } = require('./raw-api');
            initSources().then(() => console.log('✅ Sources loaded without npm dependencies')).catch(e => console.log('⚠️', e.message));
          "
          mv node_modules_bak node_modules

      - name: Test all output formats
        run: |
          echo "Format: full"
          node raw-api.js --tmdb=24428 --format=full 2>&1 | head -5
          echo "Format: compact"
          node raw-api.js --tmdb=24428 --format=compact 2>&1 | head -5
          echo "Format: cloudstream"
          node raw-api.js --tmdb=24428 --format=cloudstream 2>&1 | head -5
          echo "Format: skystream"
          node raw-api.js --tmdb=24428 --format=skystream 2>&1 | head -5
          echo "Format: nuvio"
          node raw-api.js --tmdb=24428 --format=nuvio 2>&1 | head -5
          echo "Format: stremio"
          node raw-api.js --tmdb=24428 --format=stremio 2>&1 | head -5
          echo "✅ All formats working"
