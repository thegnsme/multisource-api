name: Source Health Check

on:
  schedule:
    - cron: "30 18 * * *" # Daily at 18:30 UTC
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install

      - name: Run health check
        run: node scripts/source-health.js --update-readme
        timeout-minutes: 10

      - name: Commit health report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SOURCE_HEALTH.md
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "docs: update source health report [skip ci]"
          git push
